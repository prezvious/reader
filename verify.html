<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verify your Reader account.">
  <title>Account Verified — Reader</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" as="style">
  <link rel="icon" type="image/png" href="icon/favicon-256.png">
  <style>
    .verify-card {
      text-align: center;
      padding: var(--space-12) var(--space-8);
    }

    .verify-card__icon {
      width: 80px;
      height: 80px;
      margin: 0 auto var(--space-8);
      border-radius: 50%;
      background: var(--accent-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.5s ease-out;
    }

    .verify-card__icon svg {
      width: 40px;
      height: 40px;
      color: var(--accent);
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawCheck 0.6s ease-out 0.3s forwards;
    }

    .verify-card__title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
      animation: fadeInUp 0.5s ease-out 0.2s both;
    }

    .verify-card__message {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
      line-height: 1.6;
      animation: fadeInUp 0.5s ease-out 0.3s both;
    }

    .verify-card__details {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      margin-bottom: var(--space-8);
      text-align: left;
      animation: fadeInUp 0.5s ease-out 0.4s both;
    }

    .verify-card__detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
    }

    .verify-card__detail + .verify-card__detail {
      border-top: 1px solid var(--border);
      padding-top: var(--space-3);
      margin-top: var(--space-1);
    }

    .verify-card__detail-label {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .verify-card__detail-value {
      color: var(--text-primary);
      font-weight: 600;
    }

    .verify-card__provider-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-8);
      animation: fadeInUp 0.5s ease-out 0.5s both;
    }

    .verify-card__provider-badge svg {
      width: 16px;
      height: 16px;
    }

    .btn--verify {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-8);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent-text);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: background-color var(--transition-fast), transform var(--transition-fast);
      animation: fadeInUp 0.5s ease-out 0.6s both;
    }

    .btn--verify:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn--verify:active {
      transform: translateY(0);
    }

    .verify-card__footer {
      margin-top: var(--space-5);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text-tertiary);
      animation: fadeInUp 0.5s ease-out 0.7s both;
    }

    .verify-card__footer a {
      color: var(--text-primary);
      text-decoration: underline;
      font-weight: 600;
    }

    .verify-card__footer a:hover {
      text-decoration: underline;
    }

    @keyframes scaleIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes drawCheck {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
      }
    }

    @media (max-width: 480px) {
      .verify-card {
        padding: var(--space-8) var(--space-5);
      }

      .verify-card__title {
        font-size: 1.5rem;
      }

      .verify-card__icon {
        width: 64px;
        height: 64px;
      }

      .verify-card__icon svg {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>
<body data-page="verify">

  <div class="auth-page">
    <div class="auth-card verify-card">
      <a href="index.html" class="auth-card__logo brand-lockup">
        <span class="sr-only">Reader</span>
        <img src="icon/r-brand-mark.png" class="brand-lockup__mark" width="192" height="192" alt="" aria-hidden="true">
        <span class="brand-lockup__text" aria-hidden="true">eader</span>
      </a>

      <div class="verify-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1 class="verify-card__title" id="verify-title">Welcome to Reader</h1>
      <p class="verify-card__message" id="verify-message"></p>

      <div class="verify-card__details">
        <div class="verify-card__detail">
          <span class="verify-card__detail-label">Name</span>
          <span class="verify-card__detail-value" id="verify-name"></span>
        </div>
        <div class="verify-card__detail">
          <span class="verify-card__detail-label">Email</span>
          <span class="verify-card__detail-value" id="verify-email"></span>
        </div>
      </div>

      <div id="provider-badge-container"></div>

      <button class="btn--verify" id="continue-btn">
        Continue to Dashboard
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

      <div class="verify-card__footer">
        Having trouble? <a href="mailto:saxumfluens@gmail.com">Contact support</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      var titleEl = document.getElementById('verify-title');
      var messageEl = document.getElementById('verify-message');
      var nameEl = document.getElementById('verify-name');
      var emailEl = document.getElementById('verify-email');
      var badgeContainer = document.getElementById('provider-badge-container');
      var continueBtn = document.getElementById('continue-btn');
      var isProcessing = false;

      /* Guard against double-initialization from Supabase onAuthStateChange */
      if (window.__verifyInitialized) return;
      window.__verifyInitialized = true;

      Auth.requireAuth().then(function (user) {
        if (!user || isProcessing) return;
        isProcessing = true;

        var displayName = user.user_metadata.display_name || user.user_metadata.full_name || user.user_metadata.name || 'Reader';
        var email = user.email || user.user_metadata.email || '';
        var provider = getProvider(user);

        nameEl.textContent = displayName;
        emailEl.textContent = email;

        if (provider === 'google') {
          titleEl.textContent = 'Signed In Successfully';
          messageEl.textContent = 'You are now signed in with your Google account. Start exploring your personalized reading experience.';
          renderProviderBadge('google');
        } else if (provider === 'email') {
          var isNew = Auth.isNewSignup(user);
          if (isNew) {
            titleEl.textContent = 'Account Created Successfully';
            messageEl.textContent = 'Welcome aboard, ' + displayName.split(' ')[0] + '! Your account is ready. Dive into your reading journey.';
          } else {
            titleEl.textContent = 'Welcome Back';
            messageEl.textContent = 'Signed in successfully. Your reading list is waiting for you.';
          }
          renderProviderBadge('email');
        } else {
          titleEl.textContent = 'Signed In Successfully';
          messageEl.textContent = 'You are now signed in. Enjoy your reading experience.';
          renderProviderBadge(provider);
        }
      }).catch(function (error) {
        console.error('Verification page error:', error);
        window.location.href = 'signin.html';
      });

      continueBtn.addEventListener('click', function () {
        window.location.href = 'dashboard.html';
      });

      function getProvider(user) {
        if (user.app_metadata && user.app_metadata.provider) {
          return user.app_metadata.provider;
        }
        if (user.user_metadata && user.user_metadata.provider) {
          return user.user_metadata.provider;
        }
        return 'email';
      }

      function renderProviderBadge(provider) {
        var badgeHtml = '';
        if (provider === 'google') {
          badgeHtml = '<div class="verify-card__provider-badge"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</div>';
        } else if (provider === 'email') {
          badgeHtml = '<div class="verify-card__provider-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>Email</div>';
        }
        badgeContainer.innerHTML = badgeHtml;
      }
    })();
  </script>
</body>
</html>
