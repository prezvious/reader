  <main>
    <section class="container section--padded">
      <div class="section-header">
        <h1 class="section-header__title">Bookmarked Articles</h1>
      </div>
      <div class="article-grid" id="bookmarks-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__brand">Reader</p>
      <p class="footer__copy">&copy; 2026 &middot; All rights reserved</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/manifest.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      'use strict';

      function renderIcon(name, className) {
        if (window.ReaderIcons && typeof window.ReaderIcons.render === 'function') {
          return window.ReaderIcons.render(name, className);
        }

        return '';
      }

      document.addEventListener('DOMContentLoaded', function () {
        Auth.requireAuth().then(function (user) {
          if (!user) return;
          App.renderUser(user);
          return Manifest.load();
        }).then(function () {
          var user = Auth.getUser();
          if (user) loadBookmarks(user.id);
        }).catch(function (err) {
          console.error('Bookmarks init error:', err);
        });
      });

      async function loadBookmarks(userId) {
        var container = document.getElementById('bookmarks-grid');
        container.innerHTML = '<div style="grid-column:1/-1;display:flex;justify-content:center;padding:var(--space-16);"><div class="skeleton skeleton-card" style="width:100%;height:200px;"></div></div>';

        var bookmarks;
        try {
          bookmarks = await Supabase.getBookmarks(userId);
        } catch (err) {
          console.error('Error loading bookmarks:', err);
          container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p class="empty-state__title">Unable to load bookmarks</p><p class="empty-state__text">Please try refreshing the page.</p></div>';
          return;
        }

        var articles = window.ARTICLES || [];

        if (bookmarks.length === 0) {
          container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p class="empty-state__title">No bookmarks yet</p><p class="empty-state__text"><a href="articles.html" style="color:var(--accent);">Browse articles</a> and bookmark ones you want to revisit.</p></div>';
          return;
        }

        var html = '';
        bookmarks.forEach(function (b, i) {
          var article = articles.find(function (a) { return a.slug === b.article_slug; });
          if (!article) {
            html += '<div class="empty-state"><p class="empty-state__title">Article no longer available</p><p class="empty-state__text">This bookmarked article has been removed.</p></div>';
            return;
          }
          var initials = Manifest.getInitials(article.author.name);
          var url = App.getArticleUrl(article.slug);
          var hasImage = article.coverImage && article.coverImage.length > 0;
          var imageHtml = hasImage
            ? '<img class="article-card__image" src="' + App.escapeHtml(article.coverImage) + '" alt="' + App.escapeHtml(article.coverImageAlt || article.title) + '" loading="lazy">'
            : '<div class="article-card__image article-card__image--placeholder">' + App.escapeHtml(initials) + '</div>';

          html += '<article class="article-card bookmark-card reveal" data-slug="' + App.escapeHtml(article.slug) + '" style="transition-delay:' + (i * 0.06) + 's">' +
            '<button class="bookmark-card__remove" data-slug="' + App.escapeHtml(article.slug) + '" aria-label="Remove bookmark">' +
              renderIcon('x') +
            '</button>' +
            '<a href="' + App.escapeHtml(url) + '" class="article-card__link" aria-label="' + App.escapeHtml(article.title) + ' by ' + App.escapeHtml(article.author.name) + '">' + imageHtml + '</a>' +
            '<div class="article-card__body">' +
              '<span class="article-card__category">' + App.escapeHtml(article.category) + '</span>' +
              '<h2 class="article-card__title">' + App.escapeHtml(article.title) + '</h2>' +
              '<p class="article-card__excerpt">' + App.escapeHtml(article.excerpt) + '</p>' +
              '<div class="article-card__meta">' +
                '<div class="article-card__info">' +
                  '<div class="article-card__author">' + App.escapeHtml(article.author.name) + '</div>' +
                  '<div class="article-card__date">' + Manifest.formatDate(article.publishedAt) + '</div>' +
                '</div>' +
                '<span class="article-card__read-time">' + (article.readTime || '-') + ' min read</span>' +
              '</div>' +
            '</div>' +
          '</article>';
        });

        container.innerHTML = html;

        container.querySelectorAll('.article-card').forEach(function (card) {
          card.addEventListener('click', function (e) {
            if (e.target.closest('.bookmark-card__remove')) return;
            var slug = card.getAttribute('data-slug');
            if (slug) window.location.href = App.getArticleUrl(slug);
          });
        });

        container.querySelectorAll('.bookmark-card__remove').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var slug = btn.getAttribute('data-slug');
            Supabase.removeBookmark(userId, slug).then(function () {
              App.showToast('Bookmark removed');
              var card = btn.closest('.article-card');
              if (card) {
                card.style.opacity = '0';
                card.style.transform = 'scale(0.95)';
                setTimeout(function () { card.remove(); }, 300);
              }
            }).catch(function (err) {
              console.error('removeBookmark failed:', err);
              App.showToast('Unable to remove bookmark. Please try again.');
            });
          });
        });

        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        container.querySelectorAll('.reveal').forEach(function (el) { observer.observe(el); });
      }
    })();
  </script>
  <script src="js/search.js"></script>
</body>
</html>
