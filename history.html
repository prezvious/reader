          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>

          <div class="avatar-dropdown__menu" id="avatar-menu">

              <div class="avatar-dropdown__name" id="menu-name">Loading...</div>
              <div class="avatar-dropdown__email" id="menu-email"></div>
            </div>
            <div class="avatar-dropdown__list">
              <a href="dashboard.html" class="avatar-dropdown__item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Dashboard
              </a>
              <a href="bookmarks.html" class="avatar-dropdown__item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                Bookmarks
              </a>
              <a href="history.html" class="avatar-dropdown__item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Reading History
              </a>
              <a href="profile.html" class="avatar-dropdown__item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile Settings
              </a>
              <div class="avatar-dropdown__divider"></div>
              <button class="avatar-dropdown__item avatar-dropdown__item--danger" id="menu-signout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
              </button>
            </div>
          </div>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar__logo">Reader</a>
    <div class="sidebar__user" id="sidebar-user">
      <div class="sidebar__user-avatar" id="sidebar-avatar">
        <span id="sidebar-initials">?</span>
      </div>
      <div class="sidebar__user-info">
        <div class="sidebar__user-name" id="sidebar-name">Loading...</div>
        <div class="sidebar__user-email" id="sidebar-email"></div>
      </div>
    </div>
    <div class="sidebar__nav">
      <a href="index.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="articles.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Articles
      </a>
      <a href="dashboard.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="bookmarks.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        Bookmarks
      </a>
      <a href="history.html" class="sidebar__link sidebar__link--active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Reading History
      </a>
      <a href="profile.html" class="sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
    </div>
    <button class="sidebar__signout" id="sidebar-signout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </nav>
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <main>
    <section class="container" style="padding-top:var(--space-10);padding-bottom:var(--space-16);max-width:700px;">
      <div class="section-header">
        <h1 class="section-header__title">Reading History</h1>
        <button class="btn btn--ghost" id="clear-history-btn" style="font-size:0.8rem;padding:var(--space-2) var(--space-4);">Clear All History</button>
      </div>
      <div id="history-list"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__brand">Reader</p>
      <p class="footer__copy">&copy; 2026 &middot; All rights reserved</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/manifest.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      'use strict';

      var currentUser = null;

      document.addEventListener('DOMContentLoaded', function () {
        Auth.requireAuth().then(function (user) {
          if (!user) return;
          currentUser = user;
          App.renderUser(user);
          loadHistory(user.id);
        });
      });

      document.getElementById('clear-history-btn').addEventListener('click', function () {
        if (confirm('Clear all reading history? This cannot be undone.')) {
          if (!currentUser) return;
          Supabase.clearHistory(currentUser.id).then(function (err) {
            if (err) {
              App.showToast('Unable to clear history. Please try again.');
              return;
            }
            loadHistory(currentUser.id);
          });
        }
      });

      async function loadHistory(userId) {
        var container = document.getElementById('history-list');
        var history;
        try {
          history = await Supabase.getReadingHistory(userId);
        } catch (err) {
          console.error('Error loading reading history:', err);
          container.innerHTML = '<div class="empty-state"><p class="empty-state__title">Unable to load reading history</p><p class="empty-state__text">Please try refreshing the page.</p></div>';
          return;
        }

        if (history.length === 0) {
          container.innerHTML = '<div class="empty-state"><p class="empty-state__title">No reading history yet</p><p class="empty-state__text"><a href="articles.html" style="color:var(--accent);">Browse articles</a> to start tracking your reading.</p></div>';
          return;
        }

        var articles = window.ARTICLES || [];
        var html = '';

        history.forEach(function (entry) {
          var article = articles.find(function (a) { return a.slug === entry.article_slug; });
          if (!article) {
            html += '<div class="history-item" style="margin-bottom:var(--space-3);opacity:0.6;">' +
              '<div class="history-item__body">' +
                '<div class="history-item__title">Article no longer available</div>' +
                '<div class="history-item__meta">This article has been removed.</div>' +
              '</div>' +
            '</div>';
            return;
          }

          var isComplete = !!entry.completed_at;
          var lastRead = new Date(entry.last_read_at);
          var dateStr = Manifest.formatDate(lastRead.toISOString());
          var actionText = isComplete ? 'Read Again' : 'Continue Reading';
          var actionUrl = App.getArticleUrl(entry.article_slug);
          var progress = (entry.progress_percent != null) ? entry.progress_percent : 0;

          html += '<div class="history-item" style="margin-bottom:var(--space-3);">' +
            '<div class="history-item__body" style="cursor:pointer;" data-slug="' + App.escapeHtml(entry.article_slug) + '">' +
              '<div class="history-item__title">' + App.escapeHtml(article.title) + '</div>';

          if (isComplete) {
            html += '<div class="history-item__badge">Completed</div>';
          } else {
            html += '<div class="progress-bar" style="margin-bottom:var(--space-2);"><div class="progress-bar__fill" style="width:' + progress + '%;"></div></div>';
          }

          html += '<div class="history-item__meta">' + (isComplete ? 'Completed' : 'Last read') + ' &middot; ' + dateStr + '</div>' +
            '</div>' +
            '<div class="history-item__actions">' +
              '<a href="' + App.escapeHtml(actionUrl) + '" class="btn btn--ghost" style="font-size:0.8rem;padding:var(--space-2) var(--space-4);white-space:nowrap;">' + actionText + '</a>' +
            '</div>' +
          '</div>';
        });

        container.innerHTML = html;

        container.querySelectorAll('.history-item__body[data-slug]').forEach(function (body) {
          body.addEventListener('click', function () {
            var slug = body.getAttribute('data-slug');
            if (slug) window.location.href = App.getArticleUrl(slug);
          });
        });
      }
    })();
  </script>
</body>
</html>
