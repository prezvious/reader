  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var params = new URLSearchParams(window.location.search);
      var query = params.get('q');
      var input = document.getElementById('search-page-input');
      var grid = document.getElementById('search-results-grid');
      var meta = document.getElementById('search-page-meta');
      var titleEl = document.getElementById('search-page-title');

      try {
        await Manifest.load();
        await Manifest.calcAllReadTimes();
      } catch (err) {
        console.warn('Search manifest load failed:', err);
      }

      Auth.initAuth().then(function (user) {
        if (user) App.renderUser(user);
      }).catch(function () { /* Public page */ });

      if (!query) {
        if (titleEl) titleEl.textContent = 'Search the archive';
        meta.textContent = 'Find essays, guides, and long-form articles across Reader.';
      } else {
        input.value = query;
        if (titleEl) titleEl.textContent = 'Search results for "' + query + '"';
        document.title = query + ' â€” Search â€” Reader';
        meta.textContent = 'Searching...';

        var start = performance.now();
        var dbResults = [];
        try {
          dbResults = window.Supabase && window.Supabase.searchArticles ? await window.Supabase.searchArticles(query) : [];
        } catch (err) {
          console.warn('DB search failed:', err);
        }
        var staticResults = window.Manifest && window.Manifest.searchArticles ? window.Manifest.searchArticles(query) : [];
        var allResults = dbResults.concat(staticResults.filter(function (item) {
          return !dbResults.some(function (dbItem) { return dbItem.slug === item.slug; });
        }));
        var end = performance.now();
        var time = ((end - start) / 1000).toFixed(2);

        meta.textContent = allResults.length + ' result' + (allResults.length !== 1 ? 's' : '') + ' Â· ' + time + 's';

        if (allResults.length === 0) {
          grid.innerHTML = '<div class="search-empty"><svg class="search-empty__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div class="search-empty__title">No articles match "' + App.escapeHtml(query) + '"</div><div class="search-empty__text">Try different keywords, or <a href="articles.html">Browse all articles</a>.</div></div>';
        } else {
          grid.innerHTML = allResults.map(function (result) {
            var manifestArticle = (window.ARTICLES || []).find(function (item) { return item.slug === result.slug; }) || null;
            var authorName = manifestArticle && manifestArticle.author ? manifestArticle.author.name : (result.author_name || 'Unknown');
            var category = manifestArticle ? manifestArticle.category : (result.category || 'Uncategorized');
            var initials = Manifest.getInitials(authorName);
            var title = manifestArticle ? manifestArticle.title : result.title;
            var excerpt = manifestArticle ? manifestArticle.excerpt : (result.excerpt || '');
            var coverImage = manifestArticle ? manifestArticle.coverImage : '';
            var coverImageAlt = manifestArticle ? (manifestArticle.coverImageAlt || title) : title;
            var publishedAt = manifestArticle ? manifestArticle.publishedAt : (result.published_at || result.updated_at || '');
            var readTimeValue = manifestArticle && manifestArticle.readTime
              ? manifestArticle.readTime
              : Manifest.calcReadTimeFromText(result.content_html || excerpt || '');
            var imageHtml = coverImage
              ? '<img class="article-card__image" src="' + App.escapeHtml(coverImage) + '" alt="' + App.escapeHtml(coverImageAlt) + '" loading="lazy">'
              : '<div class="article-card__image article-card__image--placeholder">' + App.escapeHtml(initials) + '</div>';

            return '<article class="article-card">' +
              '<a href="article.html?slug=' + encodeURIComponent(result.slug) + '" class="article-card__link" aria-label="' + App.escapeHtml(title) + ' by ' + App.escapeHtml(authorName) + '">' +
                imageHtml +
              '</a>' +
              '<div class="article-card__body">' +
                '<span class="article-card__category">' + App.escapeHtml(category) + '</span>' +
                '<h2 class="article-card__title">' + App.escapeHtml(title) + '</h2>' +
                '<p class="article-card__excerpt">' + App.escapeHtml(excerpt) + '</p>' +
                '<div class="article-card__meta">' +
                  '<div class="article-card__info">' +
                    '<div class="article-card__author">' + App.escapeHtml(authorName) + '</div>' +
                    '<div class="article-card__date">' + App.escapeHtml(Manifest.formatDate(publishedAt)) + '</div>' +
                  '</div>' +
                  '<span class="article-card__read-time">' + App.escapeHtml(String(readTimeValue)) + ' min read</span>' +
                '</div>' +
              '</div>' +
            '</article>';
          }).join('');
        }
      }

      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          var value = e.target.value.trim();
          if (value.length >= 2) {
            window.location.href = 'search.html?q=' + encodeURIComponent(value);
          }
        }
      });
    });
  </script>
