<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Reader.">
  <title>Sign In — Reader</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" as="style"></head>
<body data-page="signin">

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-card__logo">Reader</a>
      <h1 class="auth-card__title">Welcome back</h1>
      <p class="auth-card__subtitle">Sign in to continue reading.</p>

      <div class="alert alert--error" id="error-banner"></div>
      <div class="alert alert--success" id="success-banner"></div>

      <form id="signin-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="signin-email">Email</label>
          <input class="form-input" type="email" id="signin-email" placeholder="you@example.com" required autocomplete="email">
          <div class="form-error" id="signin-email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signin-password">Password</label>
          <input class="form-input" type="password" id="signin-password" placeholder="Your password" required autocomplete="current-password">
          <div class="form-error" id="signin-password-error"></div>
        </div>

        <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>

        <button class="btn btn--primary btn--auth" type="submit" id="signin-btn">
          <span class="btn__text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-divider">
        <span class="auth-divider__text">or</span>
      </div>

      <div class="social-buttons">
        <button class="btn--social" type="button" id="google-signin-btn">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html" id="signup-link">Sign up</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      var form = document.getElementById('signin-form');
      var emailInput = document.getElementById('signin-email');
      var passwordInput = document.getElementById('signin-password');
      var submitBtn = document.getElementById('signin-btn');
      var errorBanner = document.getElementById('error-banner');
      var successBanner = document.getElementById('success-banner');

      Auth.redirectIfLoggedIn().then(function (redirected) {
        if (redirected) return;
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearErrors();

        var email = emailInput.value.trim();
        var password = passwordInput.value;
        var valid = true;

        if (!email) {
          showFieldError(emailInput, 'signin-email-error', 'Email is required.');
          valid = false;
        } else if (!isValidEmail(email)) {
          showFieldError(emailInput, 'signin-email-error', 'Please enter a valid email address.');
          valid = false;
        }

        if (!password) {
          showFieldError(passwordInput, 'signin-password-error', 'Password is required.');
          valid = false;
        }

        if (!valid) return;

        setLoading(true);

        Auth.signIn(email, password).catch(function (err) {
          showError(err.message || String(err));
        }).finally(function () {
          setLoading(false);
        });
      });

      document.getElementById('google-signin-btn').addEventListener('click', function () {
        Auth.signInWithGoogle().catch(function (err) { showError(err.message || String(err)); });
      });

      document.getElementById('forgot-password-link').addEventListener('click', function (e) {
        e.preventDefault();
        var email = emailInput.value.trim();
        if (!email || !isValidEmail(email)) {
          showError('Please enter your email address above to receive a password reset link.');
          emailInput.focus();
          return;
        }
        Auth.resetPassword(email).then(function () {
          showSuccess('Password reset email sent. Check your inbox.');
        }).catch(function (err) {
          showError(err.message || String(err));
        });
      });

      function showFieldError(input, errorId, message) {
        input.classList.add('form-input--error');
        var errorEl = document.getElementById(errorId);
        if (errorEl) {
          errorEl.textContent = message;
          errorEl.classList.add('form-error--visible');
        }
      }

      function clearErrors() {
        errorBanner.classList.remove('alert--visible');
        successBanner.classList.remove('alert--visible');
        document.querySelectorAll('.form-input--error').forEach(function (el) { el.classList.remove('form-input--error'); });
        document.querySelectorAll('.form-error--visible').forEach(function (el) { el.classList.remove('form-error--visible'); });
      }

      function showError(message) {
        errorBanner.textContent = message;
        errorBanner.classList.add('alert--visible');
      }

      function showSuccess(message) {
        clearErrors();
        successBanner.textContent = message;
        successBanner.classList.add('alert--visible');
      }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.classList.toggle('btn--auth--loading', loading);
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }
    })();
  </script>
</body>
</html>
