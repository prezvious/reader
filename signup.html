<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Reader account.">
  <title>Sign Up — Reader</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" as="style">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>R</text></svg>">
</head>
<body data-page="signup">

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-card__logo">Reader</a>
      <h1 class="auth-card__title">Create your account</h1>
      <p class="auth-card__subtitle">Start your reading journey today.</p>

      <div class="alert alert--error" id="error-banner"></div>
      <div class="alert alert--success" id="success-banner"></div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="signup-name">Display Name</label>
          <input class="form-input" type="text" id="signup-name" placeholder="Your name" required autocomplete="name">
          <div class="form-error" id="signup-name-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-email">Email</label>
          <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
          <div class="form-error" id="signup-email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input class="form-input" type="password" id="signup-password" placeholder="Min 8 characters" required autocomplete="new-password">
          <div class="password-strength" id="password-strength">
            <div class="password-strength__bar">
              <div class="password-strength__fill" id="strength-fill"></div>
            </div>
            <span class="password-strength__text" id="strength-text"></span>
          </div>
          <div class="form-error" id="signup-password-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-confirm">Confirm Password</label>
          <input class="form-input" type="password" id="signup-confirm" placeholder="Repeat your password" required autocomplete="new-password">
          <div class="form-error" id="signup-confirm-error"></div>
        </div>

        <button class="btn btn--primary btn--auth" type="submit" id="signup-btn">
          <span class="btn__text">Create Account</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-divider">
        <span class="auth-divider__text">or</span>
      </div>

      <div class="social-buttons">
        <button class="btn--social" type="button" id="google-signup-btn">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="signin.html" id="signin-link">Sign in</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      var form = document.getElementById('signup-form');
      var nameInput = document.getElementById('signup-name');
      var emailInput = document.getElementById('signup-email');
      var passwordInput = document.getElementById('signup-password');
      var confirmInput = document.getElementById('signup-confirm');
      var submitBtn = document.getElementById('signup-btn');
      var errorBanner = document.getElementById('error-banner');
      var successBanner = document.getElementById('success-banner');
      var strengthEl = document.getElementById('password-strength');
      var strengthFill = document.getElementById('strength-fill');
      var strengthText = document.getElementById('strength-text');

      Auth.redirectIfLoggedIn().then(function (redirected) {
        if (redirected) return;
      });

      passwordInput.addEventListener('input', function () {
        var val = passwordInput.value;
        if (!val) {
          strengthEl.classList.remove('password-strength--visible');
          return;
        }
        strengthEl.classList.add('password-strength--visible');
        var score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        strengthFill.className = 'password-strength__fill';
        if (score <= 1) {
          strengthFill.classList.add('password-strength__fill--weak');
          strengthText.textContent = 'Weak';
        } else if (score <= 2) {
          strengthFill.classList.add('password-strength__fill--medium');
          strengthText.textContent = 'Medium';
        } else {
          strengthFill.classList.add('password-strength__fill--strong');
          strengthText.textContent = 'Strong';
        }
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearErrors();

        var name = nameInput.value.trim();
        var email = emailInput.value.trim();
        var password = passwordInput.value;
        var confirm = confirmInput.value;
        var valid = true;

        if (!name) {
          showFieldError(nameInput, 'signup-name-error', 'Display name is required.');
          valid = false;
        }

        if (!email) {
          showFieldError(emailInput, 'signup-email-error', 'Email is required.');
          valid = false;
        } else if (!isValidEmail(email)) {
          showFieldError(emailInput, 'signup-email-error', 'Please enter a valid email address.');
          valid = false;
        }

        if (!password) {
          showFieldError(passwordInput, 'signup-password-error', 'Password is required.');
          valid = false;
        } else if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
          showFieldError(passwordInput, 'signup-password-error', 'Password must be at least 8 characters with 1 uppercase letter and 1 number.');
          valid = false;
        }

        if (password !== confirm) {
          showFieldError(confirmInput, 'signup-confirm-error', 'Passwords do not match.');
          valid = false;
        }

        if (!valid) return;

        setLoading(true);

        Auth.signUp(email, password, name).then(function (result) {
          if (result.requiresConfirmation) {
            showSuccess('Account created! Please check your email to confirm your account.');
            form.reset();
            strengthEl.classList.remove('password-strength--visible');
          }
        }).catch(function (err) {
          showError(err.message || String(err));
        }).finally(function () {
          setLoading(false);
        });
      });

      document.getElementById('google-signup-btn').addEventListener('click', function () {
        Auth.signInWithGoogle().catch(function (err) { showError(err.message || String(err)); });
      });

      function showFieldError(input, errorId, message) {
        input.classList.add('form-input--error');
        var errorEl = document.getElementById(errorId);
        if (errorEl) {
          errorEl.textContent = message;
          errorEl.classList.add('form-error--visible');
        }
      }

      function clearErrors() {
        errorBanner.classList.remove('alert--visible');
        successBanner.classList.remove('alert--visible');
        document.querySelectorAll('.form-input--error').forEach(function (el) { el.classList.remove('form-input--error'); });
        document.querySelectorAll('.form-error--visible').forEach(function (el) { el.classList.remove('form-error--visible'); });
      }

      function showError(message) {
        errorBanner.textContent = message;
        errorBanner.classList.add('alert--visible');
      }

      function showSuccess(message) {
        /* Clear any visible error banner before showing success */
        errorBanner.classList.remove('alert--visible');
        successBanner.textContent = message;
        successBanner.classList.add('alert--visible');
      }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.classList.toggle('btn--auth--loading', loading);
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }
    })();
  </script>
</body>
</html>
