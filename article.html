  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    (function () {
      'use strict';

      var currentUser = null;
      var currentSlug = '';
      var lastSavedProgress = 0;
      var progressTimer = null;
      var isTracking = true;

      /* Load article for everyone; hydrate auth optionally */
      document.addEventListener('DOMContentLoaded', function () {
        /* Hydrate user if logged in (optional) — use initAuth to avoid redirect */
        Auth.initAuth().then(function (user) {
          if (user) {
            currentUser = user;
            App.renderUser(user);
            currentSlug = App.getCurrentSlug();
            loadArticleInteractions(user.id, currentSlug);
          } else {
            /* Not logged in — enable buttons but hide interactive features */
            currentSlug = App.getCurrentSlug();
            document.getElementById('like-btn').disabled = true;
            document.getElementById('bookmark-btn').disabled = true;
          }
        }).catch(function () {
          /* Auth failed — still load article, disable interactive features */
          currentSlug = App.getCurrentSlug();
          document.getElementById('like-btn').disabled = true;
          document.getElementById('bookmark-btn').disabled = true;
        });
      });

      document.getElementById('like-btn').addEventListener('click', function () {
        if (!currentUser || !currentSlug) return;
        var btn = document.getElementById('like-btn');
        btn.disabled = true;

        var currentlyLiked = btn.classList.contains('reaction-btn--active');

        Auth.refreshSession().then(function (user) {
          if (!user || !currentSlug) {
            btn.disabled = false;
            if (!user) { App.showToast('Please sign in again.'); window.location.href = 'signin.html'; }
            return;
          }
          currentUser = user;

          if (currentlyLiked) {
            return Supabase.removeReaction(user.id, currentSlug).then(function () {
              btn.classList.remove('reaction-btn--active');
              var countEl = document.getElementById('like-count');
              countEl.textContent = Math.max(0, parseInt(countEl.textContent) - 1);
              btn.querySelector('svg').setAttribute('fill', 'none');
            });
          } else {
            return Supabase.addReaction(user.id, currentSlug, 'like').then(function () {
              btn.classList.add('reaction-btn--active');
              var countEl = document.getElementById('like-count');
              countEl.textContent = parseInt(countEl.textContent) + 1;
              btn.querySelector('svg').setAttribute('fill', 'currentColor');
            });
          }
        }).catch(function (err) {
          console.error('addReaction failed:', err);
          App.showToast('Unable to update reaction. Please try again.');
        }).finally(function () {
          btn.disabled = false;
        });
      });

      document.getElementById('bookmark-btn').addEventListener('click', function () {
        if (!currentUser || !currentSlug) return;
        var btn = document.getElementById('bookmark-btn');
        btn.disabled = true;

        var currentlyBookmarked = btn.classList.contains('bookmark-btn--active');

        Auth.refreshSession().then(function (user) {
          if (!user || !currentSlug) {
            btn.disabled = false;
            if (!user) { App.showToast('Please sign in again.'); window.location.href = 'signin.html'; }
            return;
          }
          currentUser = user;

          if (currentlyBookmarked) {
            return Supabase.removeBookmark(user.id, currentSlug).then(function () {
              btn.classList.remove('bookmark-btn--active');
              btn.querySelector('svg').setAttribute('fill', 'none');
              App.showToast('Bookmark removed');
            });
          } else {
            return Supabase.addBookmark(user.id, currentSlug).then(function () {
              btn.classList.add('bookmark-btn--active');
              btn.querySelector('svg').setAttribute('fill', 'currentColor');
              App.showToast('Article bookmarked');
            });
          }
        }).catch(function (err) {
          console.error('addBookmark failed:', err);
          App.showToast('Unable to update bookmark. Please try again.');
        }).finally(function () {
          btn.disabled = false;
        });
      });

      document.addEventListener('visibilitychange', function () {
        isTracking = !document.hidden;
        if (document.hidden && progressTimer) {
          clearInterval(progressTimer);
          progressTimer = null;
        } else if (!document.hidden && currentUser && currentSlug) {
          startProgressTracking();
        }
      });

      /* Progress is tracked by the 10-second interval timer in startProgressTracking().
         We intentionally do NOT use beforeunload for progress saves because
         async Supabase calls cannot complete before the page navigates away. */

      function loadArticleInteractions(userId, slug) {
        if (!slug) return;

        /* Enable buttons now that auth is resolved */
        document.getElementById('like-btn').disabled = false;
        document.getElementById('bookmark-btn').disabled = false;

        Supabase.getReactionCount(slug).then(function (count) {
          document.getElementById('like-count').textContent = count;
        });

        Supabase.hasReacted(userId, slug).then(function (result) {
          var btn = document.getElementById('like-btn');
          if (result.value) {
            btn.classList.add('reaction-btn--active');
            btn.querySelector('svg').setAttribute('fill', 'currentColor');
          }
        });

        Supabase.isBookmarked(userId, slug).then(function (result) {
          var btn = document.getElementById('bookmark-btn');
          if (result.value) {
            btn.classList.add('bookmark-btn--active');
            btn.querySelector('svg').setAttribute('fill', 'currentColor');
          }
        });

        Supabase.getHistoryEntry(userId, slug).then(function (entry) {
          if (entry && entry.progress_percent > 0 && !entry.completed_at) {
            var banner = document.getElementById('continue-banner');
            banner.style.display = 'flex';
            document.getElementById('continue-banner-text').textContent = 'Continue reading';
            document.getElementById('continue-banner-progress').textContent = entry.progress_percent + '% complete';
            lastSavedProgress = entry.progress_percent;
          } else if (entry) {
            lastSavedProgress = entry.progress_percent || 0;
          }
          startProgressTracking();
        });
      }

      function startProgressTracking() {
        if (progressTimer) clearInterval(progressTimer);
        progressTimer = setInterval(function () {
          if (!isTracking || !currentUser || !currentSlug) return;
          var progress = calculateScrollProgress();
          if (progress >= 90) {
            /* Hide the continue banner once the article is marked complete */
            var banner = document.getElementById('continue-banner');
            if (banner && banner.style.display !== 'none') {
              banner.style.display = 'none';
            }
            Supabase.markComplete(currentUser.id, currentSlug).catch(function (err) {
              console.error('markComplete failed:', err);
            });
          } else if (Math.abs(progress - lastSavedProgress) >= 5) {
            Supabase.updateProgress(currentUser.id, currentSlug, progress).catch(function (err) {
              console.error('updateProgress failed:', err);
            });
            lastSavedProgress = progress;
          }
        }, 10000);
      }

      function calculateScrollProgress() {
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        return docHeight > 0 ? Math.round((scrollTop / docHeight) * 100) : 0;
      }
    })();
  </script>
